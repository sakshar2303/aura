name: Bug Report
description: Report a compiler bug, codegen issue, or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: aura-source
    attributes:
      label: Aura source code
      description: The .aura code that triggers the bug.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Parser
        - Type Checker
        - Web Backend (HTML/CSS/JS)
        - SwiftUI Backend
        - Compose Backend
        - CLI
        - Agent API
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Aura version
      description: Output of `aura --version`

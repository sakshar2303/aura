name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aura-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aura-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: aura-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: aura-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: aura-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --bin aura --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/aura ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/aura.exe ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/aura-linux-x86_64/aura-linux-x86_64
            artifacts/aura-linux-aarch64/aura-linux-aarch64
            artifacts/aura-macos-x86_64/aura-macos-x86_64
            artifacts/aura-macos-aarch64/aura-macos-aarch64
            artifacts/aura-windows-x86_64.exe/aura-windows-x86_64.exe
